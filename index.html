<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Partner Portal — Deal registration, joint marketing, and partner resources">
  <title>Partner Portal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230000CC'/><text x='50' y='62' font-size='24' text-anchor='middle' fill='white' font-family='system-ui' font-weight='900'>PP</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/transitions.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js" defer></script>
  <script type="module" src="js/app.js"></script>
</head>
<body>
  <div id="app" class="app-shell--login">
    <!-- Sidebar (hidden on login, shown after auth) -->
    <aside id="sidebar" class="sidebar" aria-label="Navigation"></aside>

    <!-- Sidebar overlay for mobile -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Main content -->
    <main id="main-content" class="main-content">
      <header id="topbar" class="topbar">
        <button id="hamburger" class="topbar__hamburger" aria-label="Toggle navigation">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <h1 id="topbar-title" class="topbar__title"></h1>
        <div id="topbar-actions" class="topbar__actions"></div>
      </header>
      <section id="view-container" class="view-container"></section>
    </main>
  </div>

  <!-- Modal root (portaled modals mount here) -->
  <div id="modal-root"></div>

  <!-- Toast notification container -->
  <div id="toast-root" class="toast-container"></div>
</body>
</html>
