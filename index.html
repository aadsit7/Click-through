<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Recast -  Compact Click-Through (Realistic Catalog)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://unpkg.com">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>


    <style>
      :root {
        --bg-main: #f9fafb;
        --text-primary: #111827;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --radius: 1rem;
        --border-subtle: #e5e7eb;
        --shadow-card: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        --shadow-hover: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      }
      html, body {
        background: var(--bg-main);
        color: var(--text-primary);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .focus-ring:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
      .section-card { border-radius: var(--radius); background: #ffffff; box-shadow: var(--shadow-card); transition: box-shadow 300ms ease, transform 300ms ease; }
      .section-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
      .sub-card { border-radius: calc(var(--radius) / 1.5); border: 1px solid var(--border-subtle); background: #f9fafb; transition: box-shadow 300ms ease; }
      .tile { width: 0.45rem; height: 0.45rem; border-radius: 2px; background: #e5e7eb; opacity: 0.9; }
      .run .tile { animation: tilePulse 1s ease-in-out var(--d, 0s) 1 forwards; }
      @keyframes tilePulse { 0% { transform: scale(0.7); background: #e5e7eb; opacity: 0.4; } 60% { transform: scale(1); background: var(--primary); opacity: 1; } 100% { background: #e5e7eb; opacity: 0.9; } }
      .flow-bar { height: 0.22rem; border-radius: 2px; transform-origin: left center; transform: scaleX(0); }
      .run .flow-bar { animation: barGrow 0.9s ease forwards var(--d, 0s); }
      @keyframes barGrow { to { transform: scaleX(1); } }
      .bolt-line { width: 0.22rem; border-radius: 2px; transform-origin: top center; transform: scaleY(0); }
      .run .bolt-line { animation: boltDrop 0.9s ease forwards var(--d, 0s); }
      @keyframes boltDrop { to { transform: scaleY(1); } }
      .logo-ring { width: 2.1rem; height: 2.1rem; border-radius: 9999px; display: grid; place-items: center; background: #ffffff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); transition: all 0.3s ease; }
      .logo-ring:hover { box-shadow: 0 0 8px rgba(37,99,235,0.3); transform: scale(1.05); }
      .logo-wrap { display: flex; align-items: center; gap: 0.4rem; position: relative; transition: all 300ms ease; }
      .logo-name { font-size: 0.7rem; color: #6b7280; opacity: 0; transform: translateX(-10px); transition: all 0.3s ease; }
      .show-labels .logo-wrap { flex-direction: column; align-items: flex-start; gap: 0.2rem; }
      .show-labels .logo-name { opacity: 1; transform: translateX(0); white-space: normal; text-align: left; }
      .show-labels .logo-wrap .logo-ring { width: 1.8rem; height: 1.8rem; }
      .run .logo-ring { animation: appLiftPulse 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) var(--d, 0s) 1 forwards; }
      @keyframes appLiftPulse { 0% { transform: translateY(0) scale(1); filter: saturate(0.4); opacity: 0.65; } 30% { transform: translateY(-4px) scale(1.05); } 60% { transform: translateY(-2px) scale(1.02); filter: saturate(1); opacity: 1; } 100% { transform: translateY(0) scale(1); } }
      .user-beam { height: 0.38rem; border-radius: 2px; transform-origin: left center; transform: scaleX(0); }
      .run .user-beam { animation: barGrow 1s ease forwards var(--d, 0s); }
      .badge { width: 1.15rem; height: 1.15rem; border-radius: 9999px; opacity: 0; transform: translateY(-6px) scale(0.9); }
      .run .badge { animation: badgeDrop 0.8s ease-out var(--d, 0s) forwards; }
      @keyframes badgeDrop { to { opacity: 1; transform: translateY(0) scale(1); } }
      .cat-row { display: grid; grid-template-columns: 15ch 1fr; gap: 0.5rem; align-items: center; border-top: 1px solid #e5e7eb; padding-top: 0.5rem; transition: all 300ms ease; }
      .cat-row:first-child { border-top: none; padding-top: 0; }
      .cat-title { font-size: 0.7rem; letter-spacing: 0.08em; display: flex; align-items: center; gap: 0.5rem; }
      .re-primary { background: var(--primary) !important; color: #fff !important; border: 0; border-radius: 9999px; padding: 0.5rem 1.5rem; transition: background 0.2s ease, transform 0.2s ease; }
      .re-primary:hover { background: var(--primary-hover) !important; transform: scale(1.02); }
      .re-primary:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
      .re-secondary { background: transparent !important; color: var(--text-primary) !important; border: 2px solid var(--text-primary) !important; border-radius: 9999px; padding: 0.5rem 1.5rem; transition: all 0.2s ease, transform 0.2s ease; }
      .re-secondary:hover { color: var(--primary) !important; border-color: var(--primary) !important; transform: scale(1.02); }
      @media (prefers-reduced-motion: reduce) {
        .accordion-content { transition: none !important; }
      }
      .modal-overlay { transition: opacity 300ms ease; }
      .modal-content { transition: transform 300ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 300ms ease; }
      .modal-open .modal-content { transform: scale(1); opacity: 1; }
      .modal-closed .modal-content { transform: scale(0.95); opacity: 0; }
      .check-appear{opacity:0;animation:fadeInOut 1.5s ease var(--d,0s) forwards}
      @keyframes fadeInOut{0%{opacity:0}30%{opacity:1}70%{opacity:1}100%{opacity:0}}
      .flow-connect{background-image:linear-gradient(to right, transparent 50%, #e5e7eb 50%);background-size:4px 1px;background-repeat:repeat-x;height:1px;opacity:0.5}
      .end-user-expand{transition:all 0.5s ease;transform:scale(1.05);background:#ffffff;border-color:#10b981}
      .icon-launch{animation:iconLaunch 0.5s ease forwards}
      @keyframes iconLaunch{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
      .tagline-fade{opacity:0;animation:fadeIn 1s ease 10s forwards}
      @keyframes fadeIn{to{opacity:1}}
      .overlay-tag{opacity:0;transition:opacity 0.3s ease;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,0.9);padding:1rem;border-radius:var(--radius);box-shadow:var(--shadow-card);z-index:10}
      .show-labels .overlay-tag{opacity:1;transition-delay:0.5s}
      .meta-label{font-size:0.6rem;color:#6b7280;opacity:0;transform:translateY(5px);transition:all 0.3s ease;position:relative;top:auto;left:auto;z-index:5;white-space:nowrap;display:flex;flex-direction:column;gap:0.1rem;align-items:flex-start;width:100%;justify-content:flex-start}
      .show-labels .meta-label{opacity:1;transform:translateY(0)}
      .show-labels .cat-row{grid-template-columns:15ch 1fr;gap:1rem}
      .show-labels #flowCard .flex-wrap{gap:1rem}
      .show-labels .logo-wrap{width:calc(33.333% - 0.666rem);margin-bottom:0.5rem}
      .env-wrap { display: flex; align-items: center; gap: 0.2rem; position: relative; transition: all 300ms ease; width: calc(16.666% - 0.5rem); flex-direction: column; }
      .env-name { font-size: 0.7rem; color: #6b7280; opacity: 1; transform: translateY(0); transition: all 0.3s ease; white-space: nowrap; text-align: center; }
      .env-ring { width: 1.8rem; height: 1.8rem; }
      .run .env-ring { animation: envPulse 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) var(--d, 0s) 1 forwards; }
      @keyframes envPulse { 0% { transform: scale(1); filter: saturate(0.4); opacity: 0.65; box-shadow: 0 0 0 rgba(37,99,235,0); } 30% { transform: scale(1.05); box-shadow: 0 0 12px rgba(37,99,235,0.5); } 60% { transform: scale(1.02); filter: saturate(1); opacity: 1; box-shadow: 0 0 8px rgba(37,99,235,0.3); } 100% { transform: scale(1); box-shadow: 0 0 0 rgba(37,99,235,0); } }
      .arrow-line { height: 1.5rem; width: 0.15rem; background: linear-gradient(to bottom, #e5e7eb, #2563eb); transform-origin: top center; transform: scaleY(0); margin: 0 auto; position: relative; }
      .arrow-line::after { content: ''; position: absolute; bottom: -0.3rem; left: -0.25rem; border-left: 0.4rem solid transparent; border-right: 0.4rem solid transparent; border-top: 0.6rem solid #1d4ed8; opacity: 0; transition: opacity 0.3s; }
      .run .arrow-line { animation: arrowDrop 0.8s ease forwards var(--d, 0s); }
      .run .arrow-line::after { animation: arrowTip 0.8s ease forwards var(--d, 0s); }
      @keyframes arrowDrop { 0% { transform: scaleY(0); } 100% { transform: scaleY(1); } }
      @keyframes arrowTip { 0% { opacity: 0; } 80% { opacity: 0; } 100% { opacity: 1; } }
      .hub-card { opacity: 0; transform: translateY(10px); transition: all 0.5s ease; }
      .run .hub-card { animation: hubAppear 0.8s ease forwards var(--d, 2.5s); }
      @keyframes hubAppear { to { opacity: 1; transform: translateY(0); } }
      .metrics-banner { opacity: 0; transform: translateY(10px); transition: all 0.5s ease; text-align: center; font-size: 0.9rem; font-weight: 500; color: #111827; }
      .run .metrics-banner { animation: metricsAppear 0.8s ease forwards var(--d, 3.5s); }
      @keyframes metricsAppear { to { opacity: 1; transform: translateY(0); } }
      .interactive-node { transition: opacity 0.3s, transform 0.3s; }
      .interactive-node:hover { opacity: 0.9; transform: scale(1.05); }
      .chart-container { width: 100%; height: auto; aspect-ratio: 800 / 420; background: #ffffff; border-radius: 16px; padding: 8px; }
      #capacity-gap-chart { width: 100%; height: 100%; }
      .chart-text { font-size: 11px; font-weight: 600; fill: #334155; letter-spacing: 0.01em; font-family: Inter, system-ui, sans-serif; }
      .chart-axis { stroke: #e2e8f0; stroke-width: 1; }
      .chart-axis-label { font-size: 10px; font-weight: 700; fill: #64748b; font-family: Inter, system-ui, sans-serif; letter-spacing: 0.1em; text-transform: uppercase; }
      .chart-year-label { font-size: 12px; fill: #64748b; font-weight: 600; }
      .chart-annotation { font-size: 14px; font-weight: 800; fill: #0A1C60; font-family: Inter, system-ui, sans-serif; letter-spacing: 0.06em; text-transform: uppercase; }
      .demand-line { stroke-width: 3; filter: drop-shadow(0 2px 6px rgba(239,68,68,0.25)); }
      .capacity-line { stroke-width: 2; }
      .marker-group { cursor: pointer; transition: transform 0.15s ease; }
      .marker-group:hover { transform: scale(1.08); }
      .chart-element { opacity: 0; animation: chartFadeIn 0.6s ease forwards; }
      @keyframes chartFadeIn { from { opacity: 0; } to { opacity: 1; } }
      .axis-element { animation-delay: 0s; }
      .line-element { animation-delay: 0.2s; }
      .gap-element { animation-delay: 0.4s; }
      .marker-element { animation-delay: 0.6s; }
      .label-element { animation-delay: 0.8s; }
      .analyst-trigger { cursor: pointer; border-bottom: 2px dashed #0070F3; padding-bottom: 1px; }

      :root{
        --bg-main:
          radial-gradient(1200px 700px at 18% 0%, rgba(37,99,235,0.10), transparent 58%),
          radial-gradient(900px 560px at 92% 28%, rgba(16,185,129,0.07), transparent 60%),
          linear-gradient(180deg, #fbfdff 0%, #f7f8fb 55%, #f9fafb 100%);
        --shadow-card:
          0 2px 10px rgba(15, 23, 42, 0.06),
          0 1px 3px rgba(15, 23, 42, 0.04);
        --shadow-hover:
          0 14px 36px rgba(15, 23, 42, 0.10),
          0 4px 12px rgba(15, 23, 42, 0.06);
        --shadow-elevated:
          0 28px 70px rgba(15, 23, 42, 0.18),
          0 10px 24px rgba(15, 23, 42, 0.10);
        --re-green: #10b981;
      }

      html, body { background: var(--bg-main); background-attachment: fixed; }

      .section-card{
        background: rgba(255,255,255,0.88);
        border: 1px solid rgba(226,232,240,0.70);
      }

      .glass{
        background: rgba(255,255,255,0.72) !important;
        border: 1px solid rgba(255,255,255,0.55);
        box-shadow: var(--shadow-elevated) !important;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }
      .glass-soft{
        background: rgba(255,255,255,0.62) !important;
        border: 1px solid rgba(255,255,255,0.50);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .modal-overlay{ background: rgba(2,6,23,0.55) !important; }
      .modal-content{ box-shadow: var(--shadow-elevated) !important; }

      .demand-line, .capacity-line{ stroke-linecap: round; stroke-linejoin: round; }

      .marker-group{
        transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
      }
      .marker-group:hover{
        filter: drop-shadow(0 10px 18px rgba(37,99,235,0.22));
        transform: translateY(-1px) scale(1.02);
      }

      @media (prefers-reduced-motion: reduce){
        .marker-group, .section-card, .logo-ring { transition: none !important; animation: none !important; }
      }

      .device-frame { background: #1e293b; border-radius: 12px; padding: 6px; box-shadow: 0 8px 30px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.05); position: relative; overflow: hidden; }
      .device-screen { background: #f8fafc; border-radius: 8px; overflow: hidden; }
      .device-titlebar { background: linear-gradient(180deg, #f1f5f9, #e2e8f0); padding: 6px 12px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #cbd5e1; }
      .device-dot { width: 8px; height: 8px; border-radius: 50%; }
      .device-dot-r { background: #ef4444; }
      .device-dot-y { background: #eab308; }
      .device-dot-g { background: #22c55e; }
      .device-titlebar-text { font-size: 11px; color: #64748b; margin-left: 8px; font-weight: 500; }
      .catalog-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 12px; }
      .catalog-app { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: default; padding: 5px 2px; border-radius: 8px; transition: all 0.2s ease; position: relative; }
      .catalog-app:hover { background: #f1f5f9; }
      .catalog-app.clicked { background: #eff6ff; transform: scale(0.95); }
      .catalog-app .app-icon { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; font-weight: 800; font-size: 12px; color: white; transition: all 0.3s ease; position: relative; }
      .catalog-app .app-name { font-size: 8px; color: #475569; text-align: center; line-height: 1.1; }
      .catalog-app.clicked .app-icon { box-shadow: 0 0 0 3px rgba(0,112,243,0.4); }
      @keyframes clickRing { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }
      .click-ring { position: absolute; inset: 0; border-radius: 8px; border: 2px solid #0070F3; animation: clickRing 0.6s ease-out forwards; pointer-events: none; }
      .user-status { padding: 10px 16px; border-top: 1px solid #e2e8f0; display: flex; align-items: center; gap: 8px; min-height: 40px; transition: all 0.4s ease; font-size: 12px; color: #64748b; }
      .user-status.loading { color: #0070F3; }
      .user-status.success { color: #059669; background: #f0fdf4; }
      .user-status.idle { color: #94a3b8; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .spinner { width: 14px; height: 14px; border: 2px solid #e2e8f0; border-top-color: #0070F3; border-radius: 50%; animation: spin 0.6s linear infinite; }
      .bts-section { position: relative; overflow: hidden; }
      .bts-label { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 10px; border-radius: 9999px; margin-bottom: 8px; }
      .bts-label-user { color: #059669; background: #ecfdf5; border: 1px solid #a7f3d0; }
      .bts-label-engine { color: #0070F3; background: #eff6ff; border: 1px solid #bfdbfe; }
      .orch-row { opacity: 0; transform: translateY(8px); transition: opacity 0.5s ease, transform 0.5s ease; }
      .orch-row.visible { opacity: 1; transform: translateY(0); }
      .orch-row.dimming { opacity: 0.3; filter: blur(1px); transition: opacity 1s ease, filter 1s ease; }
      .check-item { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 11px; border: 1px solid #e2e8f0; background: white; transition: all 0.3s ease; color: #94a3b8; }
      .check-item.pass { border-color: #86efac; background: #f0fdf4; color: #166534; }
      .path-row { display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-radius: 6px; font-size: 11px; border: 1px solid #e5e7eb; background: #fafafa; transition: all 0.4s ease; color: #94a3b8; }
      .path-row.active-path { border-color: #0070F3; background: #eff6ff; color: #1e40af; box-shadow: 0 0 8px rgba(0,112,243,0.12); }
      .path-row.inactive-path { opacity: 0.2; }
      .orch-connector { height: 2px; background: linear-gradient(to right, #0070F3, #10b981); transform-origin: left; transform: scaleX(0); transition: transform 0.6s ease; border-radius: 2px; margin: 4px 0; }
      .orch-connector.drawn { transform: scaleX(1); }
      @keyframes cfgWrap { 0% { border-color: transparent; } 100% { border-color: #f59e0b; } }
      .cfg-wrap { border: 2px dashed transparent; border-radius: 6px; padding: 4px 8px; transition: all 0.5s ease; }
      .cfg-wrap.wrapped { animation: cfgWrap 0.6s ease forwards; background: rgba(245,158,11,0.05); }
      .upd-bar { height: 3px; background: linear-gradient(to right, #0070F3, #10b981); border-radius: 2px; transform-origin: left; transform: scaleX(0); transition: transform 1.2s ease; }
      .upd-bar.filling { transform: scaleX(1); }
      .scenario-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 9999px; font-size: 10px; font-weight: 600; border: 1px solid #e2e8f0; background: white; color: #64748b; transition: all 0.3s ease; }
      .scenario-pill.active-scenario { border-color: #0070F3; background: #eff6ff; color: #0070F3; }
      .scenario-pill.done-scenario { border-color: #10b981; background: #ecfdf5; color: #059669; }
      /* View toggle pills */
      .view-toggle { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600; border: 1px solid #e2e8f0; background: white; color: #64748b; cursor: pointer; transition: all 0.2s ease; }
      .view-toggle.active { border-color: #0070F3; background: #eff6ff; color: #0070F3; }
      .view-toggle:hover:not(.active) { border-color: #94a3b8; }
      /* Admin console rows */
      .admin-row { padding: 8px 10px; border-radius: 8px; border: 1px solid #e5e7eb; background: white; transition: all 0.4s ease; opacity: 0.3; }
      .admin-row.row-active { opacity: 1; border-color: #0070F3; background: #eff6ff; }
      .admin-row.row-done { opacity: 1; border-color: #a7f3d0; background: #f0fdf4; }
      .admin-row.row-idle { opacity: 0.5; }
      /* Phase status label */
      .phase-status { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; transition: all 0.3s ease; }
      /* Multi-tenant view */
      .mt-zone { border-radius: 10px; padding: 10px; transition: opacity 0.5s ease, transform 0.5s ease; }
      .mt-zone.mt-hidden { opacity: 0; transform: translateY(10px); }
      .mt-zone.mt-visible { opacity: 1; transform: translateY(0); }
      .mt-primary { background: linear-gradient(135deg, #0A1C60 0%, #1e3a8a 100%); color: white; }
      .mt-secondary { background: white; border: 2px solid #0070F3; color: #0A1C60; }
      .mt-sync-line { width: 2px; height: 0; background: linear-gradient(180deg, #0070F3, #10b981); margin: 0 auto; transition: height 0.8s ease; border-radius: 2px; }
      .mt-sync-line.mt-drawn { height: 28px; }
      .mt-app-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 10px; border: 1px solid #e2e8f0; background: white; color: #475569; transition: all 0.3s ease; }
      .mt-app-pill.mt-custom { border-color: #0070F3; background: #eff6ff; }
      .mt-control { display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 4px; font-size: 9px; border: 1px solid #e2e8f0; background: #f8fafc; color: #94a3b8; transition: all 0.3s ease; }
      .mt-control.mt-lit { border-color: #10b981; background: #ecfdf5; color: #065f46; }
      .mt-callout { opacity: 0; transform: translateY(4px); transition: all 0.5s ease; font-size: 10px; font-weight: 600; }
      .mt-callout.mt-show { opacity: 1; transform: translateY(0); }
      /* Dashboard & Reporting view */
      .dr-zone { border-radius: 10px; padding: 10px; transition: opacity 0.5s ease, transform 0.5s ease; }
      .dr-zone.dr-hidden { opacity: 0; transform: translateY(10px); }
      .dr-zone.dr-visible { opacity: 1; transform: translateY(0); }
      .dr-source { background: linear-gradient(135deg, #0A1C60 0%, #1e3a8a 100%); color: white; }
      .dr-panel { background: white; border: 2px solid #0070F3; color: #0A1C60; }
      .dr-feed-line { width: 2px; height: 0; background: linear-gradient(180deg, #0070F3, #8b5cf6); margin: 0 auto; transition: height 0.8s ease; border-radius: 2px; }
      .dr-feed-line.dr-drawn { height: 28px; }

            ${phase === 'final' ? `

      function renderPipeline(){

                    <div class="pipeline-node"><i data-lucide="zap" class="w-2 h-2 text-white"></i></div>
                    <div class="stage-content">
                      <div class="stage-title"><i data-lucide="workflow" class="w-3.5 h-3.5 text-[#0070F3]"></i> Smart Icon activates</div>

                    <div class="stage-content">
                      <div class="stage-title"><i data-lucide="scan-search" class="w-3.5 h-3.5 text-[#0070F3]"></i> Evaluate user context</div>
                      <div class="stage-detail mb-1.5">Checks user, device, and environment -  no admin intervention.</div>
                      <div class="flex flex-wrap gap-1.5" id="checkItems">
                        ${scenario.checks.map((c, i) => `
                          <div class="check-item ${checkDone ? 'pass' : ''}" id="check-${i}" title="${c.a}">
                            <i data-lucide="${checkDone ? 'check-circle' : 'circle'}" class="w-3 h-3"></i>

                  <div class="pipeline-stage ${stageState(['routing'])}">
                    <div class="pipeline-node"><i data-lucide="git-branch" class="w-2 h-2 text-white"></i></div>
                    <div class="stage-content">
                      <div class="stage-title"><i data-lucide="route" class="w-3.5 h-3.5 text-[#0070F3]"></i> Route to delivery path</div>
                      <div class="stage-detail mb-1.5">One path activates. The rest stay dormant.</div>
                      <div class="flex flex-wrap gap-1.5">
                        ${ALL_PATHS.map(p => {
                          const isActive = p.id === scenario.activePath && ['routing','config','done','final'].includes(phase);
                          const isInactive = p.id !== scenario.activePath && ['routing','config','done','final'].includes(phase);
                          return `<div class="path-row ${isActive ? 'active-path' : ''} ${isInactive ? 'inactive-path' : ''}">

                          <span class="px-1.5 py-0.5 rounded ${['done','final'].includes(phase) ? 'bg-green-50 border border-green-200 text-green-600' : 'bg-slate-50 border border-slate-200 text-slate-400'} text-[10px]">v2.2</span>

                  ${scenario.dtap ? `
                  <div class="pipeline-stage ${stageState(['config','done','final'])}">
                    <div class="pipeline-node"><i data-lucide="git-merge" class="w-2 h-2 text-white"></i></div>

                      <div class="stage-title"><i data-lucide="layers" class="w-3.5 h-3.5 text-indigo-500"></i> Release pipeline</div>
                      <div class="dtap-bar">
                        ${scenario.dtap.stages.map((s, i) => `
                          ${i > 0 ? '<span class="dtap-arrow">\u2192</span>' : ''}

                            ${s}
                            ${['config','done','final'].includes(phase) ? '<div class="text-[7px]">' + (i < scenario.dtap.current ? '\u2713' : i === scenario.dtap.current ? scenario.dtap.version : '') + '</div>' : ''}

                    <div class="pipeline-node"><i data-lucide="check" class="w-2 h-2 text-white"></i></div>
                    <div class="stage-content" style="${['done','final'].includes(phase) ? 'border-color:#10b981;background:linear-gradient(135deg,#f0fdf4,#ecfdf5)' : ''}">
                      <div class="stage-title"><i data-lucide="rocket" class="w-3.5 h-3.5 text-green-500"></i> One definition -  every environment</div>

          </div>
        `;
      }

      function clearFlowTimers(){
        if (!STATE.flowTimers) STATE.flowTimers = { intervals: [], timeouts: [] };
        STATE.flowTimers.intervals.forEach(id => clearInterval(id));
        STATE.flowTimers.timeouts.forEach(id => clearTimeout(id));
        STATE.flowTimers.intervals = [];
        STATE.flowTimers.timeouts = [];
        if (STATE.csAnimRAF) { cancelAnimationFrame(STATE.csAnimRAF); STATE.csAnimRAF = null; }
      }

      /* ══════════════════════════════════════════════════
         Current-State Side-Scroller Animation
         ══════════════════════════════════════════════════ */

      // roundRect polyfill for older browsers
      if (typeof CanvasRenderingContext2D !== 'undefined' && !CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
          if (typeof r === 'number') r = [r];
          const rad = r[0] || 0;
          this.moveTo(x + rad, y);
          this.lineTo(x + w - rad, y); this.quadraticCurveTo(x + w, y, x + w, y + rad);
          this.lineTo(x + w, y + h - rad); this.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
          this.lineTo(x + rad, y + h); this.quadraticCurveTo(x, y + h, x, y + h - rad);
          this.lineTo(x, y + rad); this.quadraticCurveTo(x, y, x + rad, y);
          this.closePath(); return this;
        };
      }

      function initCSAnimation(){
        const container = document.getElementById('cs-animation-container');
        const canvas = document.getElementById('cs-animation-canvas');
        if (!canvas || !container) return;
        // Respect reduced-motion
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          drawCSStaticFinal(canvas); return;
        }
        if (STATE.csAnimPhase === 'done') { drawCSStaticFinal(canvas); return; }
        if (STATE.csAnimPhase === 'running') return; // already running
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = 960 * dpr;
        canvas.height = 360 * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        STATE.csAnimPhase = 'running';
        STATE.csAnimStartTime = null;
        STATE.csAnimCameraX = 0;
        // Show skip, hide replay
        const skipBtn = container.querySelector('.cs-skip-btn');
        const replayBtn = container.querySelector('.cs-replay-btn');
        if (skipBtn) skipBtn.style.display = '';
        if (replayBtn) replayBtn.style.display = 'none';
        function loop(ts){
          if (STATE.csAnimPhase !== 'running') return;
          if (!STATE.csAnimStartTime) STATE.csAnimStartTime = ts;
          const elapsed = (ts - STATE.csAnimStartTime) / 1000;
          csGameLoop(ctx, elapsed, 960, 360);
          if (elapsed >= CS_TOTAL_DURATION) {
            STATE.csAnimPhase = 'done';
            STATE.csAnimHasPlayed = true;
            if (skipBtn) skipBtn.style.display = 'none';
            if (replayBtn) replayBtn.style.display = '';
            return;
          }
          STATE.csAnimRAF = requestAnimationFrame(loop);
        }
        STATE.csAnimRAF = requestAnimationFrame(loop);
      }

      function csGameLoop(ctx, elapsed, W, H){
        const groundY = H - 60;
        // Phase index (0-4)
        const phase = elapsed < 3 ? 0 : elapsed < 6 ? 1 : elapsed < 9 ? 2 : elapsed < 11 ? 3 : 4;
        // Camera position — accumulate distance across phases with different speeds
        let camX = 0;
        if (elapsed <= 3) {
          camX = elapsed * CS_WORLD_SPEED;
        } else if (elapsed <= 6) {
          camX = 3 * CS_WORLD_SPEED + (elapsed - 3) * CS_WORLD_SPEED * 0.85;
        } else if (elapsed <= 9) {
          camX = 3 * CS_WORLD_SPEED + 3 * CS_WORLD_SPEED * 0.85 + (elapsed - 6) * CS_WORLD_SPEED * 0.55;
        } else if (elapsed <= 9.8) {
          camX = 3 * CS_WORLD_SPEED + 3 * CS_WORLD_SPEED * 0.85 + 3 * CS_WORLD_SPEED * 0.55 + (elapsed - 9) * CS_WORLD_SPEED * 0.15;
        } else {
          camX = 3 * CS_WORLD_SPEED + 3 * CS_WORLD_SPEED * 0.85 + 3 * CS_WORLD_SPEED * 0.55 + 0.8 * CS_WORLD_SPEED * 0.15;
        }
        STATE.csAnimCameraX = camX;

        ctx.clearRect(0, 0, W, H);
        drawCSBackground(ctx, camX, phase, elapsed, W, H, groundY);
        drawCSGround(ctx, camX, W, H, groundY);

        // Draw obstacles — world position is charX + camera at spawn time + small lead offset
        CS_OBSTACLES.forEach(function(obs){
          // Place obstacle so it appears at screen right edge (~960) at its spawn time
          let obsCamAtSpawn = 0;
          const ot = obs.t;
          if (ot <= 3) obsCamAtSpawn = ot * CS_WORLD_SPEED;
          else if (ot <= 6) obsCamAtSpawn = 3 * CS_WORLD_SPEED + (ot - 3) * CS_WORLD_SPEED * 0.85;
          else if (ot <= 9) obsCamAtSpawn = 3 * CS_WORLD_SPEED + 3 * CS_WORLD_SPEED * 0.85 + (ot - 6) * CS_WORLD_SPEED * 0.55;
          else obsCamAtSpawn = 3 * CS_WORLD_SPEED + 3 * CS_WORLD_SPEED * 0.85 + 3 * CS_WORLD_SPEED * 0.55 + (ot - 9) * CS_WORLD_SPEED * 0.15;
          const obsWorldX = obsCamAtSpawn + (obs.isWall ? 240 : 700);
          const screenX = obsWorldX - camX;
          if (screenX < -150 || screenX > W + 50) return;
          if (obs.isWall) {
            drawCSWall(ctx, screenX, groundY, obs, elapsed);
          } else {
            drawCSObstacle(ctx, screenX, groundY, obs);
          }
        });

        // Ticket rain particles in phase 3
        if (phase === 2) { drawCSTicketRain(ctx, elapsed, W, groundY); }

        // Character
        const charX = 160;
        const stressed = phase >= 2;
        const stopped = elapsed >= 9.8;
        const shake = (elapsed >= 9.8 && elapsed < 10.3) ? Math.sin((elapsed - 9.8) * 30) * 3 : 0;
        drawCSCharacter(ctx, charX + shake, groundY, elapsed, stressed, stopped);

        // HUD
        const capPct = phase === 0 ? 80 : phase === 1 ? Math.max(55, 80 - (elapsed - 0) * 4) : phase === 2 ? Math.max(15, 55 - (elapsed - 3) * 13) : phase === 3 ? Math.max(0, 15 - (elapsed - 9) * 8) : 0;
        drawCSCapacityMeter(ctx, capPct, phase, elapsed, W);

        // Phase text
        let phaseText = '';
        let textAlpha = 1;
        for (let i = CS_PHASE_TEXT.length - 1; i >= 0; i--) {
          if (elapsed >= CS_PHASE_TEXT[i].t) { phaseText = CS_PHASE_TEXT[i].text; break; }
        }
        // Fade in during first 0.5s of each phase
        for (let i = 0; i < CS_PHASE_TEXT.length; i++) {
          if (elapsed >= CS_PHASE_TEXT[i].t && elapsed < CS_PHASE_TEXT[i].t + 0.5) {
            textAlpha = (elapsed - CS_PHASE_TEXT[i].t) / 0.5;
          }
        }
        drawCSPhaseText(ctx, phaseText, textAlpha, W);

        // Down-arrow hint in phase 5
        if (phase === 4) {
          const arrowAlpha = Math.min(1, (elapsed - 11) / 0.5);
          ctx.save();
          ctx.globalAlpha = arrowAlpha * (0.5 + 0.5 * Math.sin(elapsed * 3));
          ctx.fillStyle = '#0070F3';
          ctx.beginPath();
          const ax = W / 2, ay = H - 22;
          ctx.moveTo(ax - 8, ay - 6); ctx.lineTo(ax + 8, ay - 6); ctx.lineTo(ax, ay + 4);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawCSBackground(ctx, camX, phase, elapsed, W, H, groundY){
        // Sky gradient shifts warmer with phase
        const grad = ctx.createLinearGradient(0, 0, 0, groundY);
        if (phase <= 1) { grad.addColorStop(0, '#dbeafe'); grad.addColorStop(1, '#f0f9ff'); }
        else if (phase === 2) { grad.addColorStop(0, '#fef3c7'); grad.addColorStop(1, '#fefce8'); }
        else { grad.addColorStop(0, '#fee2e2'); grad.addColorStop(1, '#fef2f2'); }
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, groundY);

        // Clouds (parallax 0.2x)
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        const clouds = [{x:100,y:40,w:80,h:24},{x:350,y:60,w:60,h:18},{x:600,y:35,w:90,h:26},{x:900,y:55,w:70,h:20},{x:1200,y:45,w:85,h:22}];
        clouds.forEach(function(c){
          const sx = ((c.x - camX * 0.15) % (W + 200)) - 100;
          ctx.beginPath();
          ctx.ellipse(sx, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
          ctx.fill();
        });

        // Server silhouettes (parallax 0.4x) — density increases with phase
        ctx.fillStyle = phase <= 1 ? '#cbd5e1' : phase === 2 ? '#94a3b8' : '#64748b';
        const serverCount = phase <= 1 ? 5 : phase === 2 ? 9 : 12;
        for (let i = 0; i < serverCount; i++) {
          const baseX = i * 180 + 50;
          const sx = ((baseX - camX * 0.4) % (W + 300)) - 150;
          const sh = 40 + (i % 3) * 20;
          ctx.fillRect(sx, groundY - sh, 18, sh);
          // LED dots
          ctx.fillStyle = phase >= 2 ? '#ef4444' : '#22c55e';
          ctx.fillRect(sx + 3, groundY - sh + 6, 3, 3);
          ctx.fillRect(sx + 3, groundY - sh + 14, 3, 3);
          ctx.fillStyle = phase <= 1 ? '#cbd5e1' : phase === 2 ? '#94a3b8' : '#64748b';
        }
      }

      function drawCSGround(ctx, camX, W, H, groundY){
        ctx.fillStyle = '#e2e8f0';
        ctx.fillRect(0, groundY, W, H - groundY);
        ctx.strokeStyle = '#cbd5e1';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, groundY); ctx.lineTo(W, groundY);
        ctx.stroke();
        // Grid lines on ground
        ctx.strokeStyle = '#d1d5db';
        ctx.lineWidth = 0.5;
        for (let x = -(camX % 60); x < W; x += 60) {
          ctx.beginPath(); ctx.moveTo(x, groundY); ctx.lineTo(x, H); ctx.stroke();
        }
      }

      function drawCSObstacle(ctx, screenX, groundY, obs){
        const x = screenX;
        const y = groundY - obs.h;
        // Block body
        ctx.fillStyle = obs.color;
        const r = 4;
        ctx.beginPath();
        ctx.moveTo(x + r, y); ctx.lineTo(x + obs.w - r, y); ctx.quadraticCurveTo(x + obs.w, y, x + obs.w, y + r);
        ctx.lineTo(x + obs.w, y + obs.h); ctx.lineTo(x, y + obs.h);
        ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.fill();
        // Highlight edge
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(x + 1, y + 1, obs.w - 2, 3);
        // Label
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 8px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(obs.label, x + obs.w / 2, y + obs.h / 2);
        ctx.textAlign = 'start';
      }

      function drawCSWall(ctx, screenX, groundY, obs, elapsed){
        const x = screenX;
        const y = groundY - obs.h;
        // Main wall body with gradient
        const wGrad = ctx.createLinearGradient(x, y, x + obs.w, y);
        wGrad.addColorStop(0, '#1e293b'); wGrad.addColorStop(1, '#334155');
        ctx.fillStyle = wGrad;
        ctx.fillRect(x, y, obs.w, obs.h);
        // Brick pattern
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        const brickH = 24;
        const brickW = obs.w / 2;
        for (let row = 0; row < obs.h / brickH; row++) {
          const by = y + row * brickH;
          ctx.beginPath(); ctx.moveTo(x, by); ctx.lineTo(x + obs.w, by); ctx.stroke();
          const offset = (row % 2) * (brickW / 2);
          for (let col = 0; col < 3; col++) {
            const bx = x + offset + col * brickW;
            ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx, by + brickH); ctx.stroke();
          }
        }
        // Red glow on left edge
        const glowGrad = ctx.createLinearGradient(x - 20, 0, x + 10, 0);
        glowGrad.addColorStop(0, 'rgba(239,68,68,0)'); glowGrad.addColorStop(1, 'rgba(239,68,68,0.15)');
        ctx.fillStyle = glowGrad;
        ctx.fillRect(x - 20, y, 30, obs.h);
        // Title
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 14px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('THE CAPACITY', x + obs.w / 2, groundY - obs.h / 2 - 10);
        ctx.fillText('WALL', x + obs.w / 2, groundY - obs.h / 2 + 10);
        // Sub-labels on bricks
        ctx.font = '9px Inter, system-ui, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        CS_WALL_LABELS.forEach(function(lbl, i){
          ctx.fillText(lbl, x + obs.w / 2, groundY - 40 - i * 28);
        });
        ctx.textAlign = 'start';
      }

      function drawCSCharacter(ctx, charX, groundY, elapsed, stressed, stopped){
        const frame = stopped ? 0 : Math.floor(elapsed * 6) % 4;
        const y = groundY;
        // Body
        ctx.fillStyle = '#0A1C60';
        ctx.beginPath();
        ctx.moveTo(charX - 8, y - 28); ctx.lineTo(charX + 8, y - 28);
        ctx.quadraticCurveTo(charX + 10, y - 28, charX + 10, y - 24);
        ctx.lineTo(charX + 10, y - 10);
        ctx.quadraticCurveTo(charX + 10, y - 8, charX + 8, y - 8);
        ctx.lineTo(charX - 8, y - 8);
        ctx.quadraticCurveTo(charX - 10, y - 8, charX - 10, y - 10);
        ctx.lineTo(charX - 10, y - 24);
        ctx.quadraticCurveTo(charX - 10, y - 28, charX - 8, y - 28);
        ctx.fill();
        // Head
        ctx.fillStyle = '#f8b84e';
        ctx.beginPath();
        ctx.arc(charX, y - 34, 8, 0, Math.PI * 2);
        ctx.fill();
        // Hardhat
        ctx.fillStyle = '#0070F3';
        ctx.beginPath();
        ctx.ellipse(charX, y - 38, 10, 4, 0, Math.PI, 0);
        ctx.fill();
        ctx.fillRect(charX - 11, y - 38, 22, 2);
        // Eyes
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(charX - 3, y - 36, 2, 2);
        ctx.fillRect(charX + 2, y - 36, 2, 2);
        // Legs (animated)
        ctx.fillStyle = '#334155';
        if (stopped) {
          ctx.fillRect(charX - 6, y - 8, 4, 8);
          ctx.fillRect(charX + 2, y - 8, 4, 8);
        } else {
          const legAngle = Math.sin(elapsed * 12) * 0.4;
          ctx.save();
          ctx.translate(charX - 4, y - 8);
          ctx.rotate(legAngle);
          ctx.fillRect(-2, 0, 4, 8);
          ctx.restore();
          ctx.save();
          ctx.translate(charX + 4, y - 8);
          ctx.rotate(-legAngle);
          ctx.fillRect(-2, 0, 4, 8);
          ctx.restore();
        }
        // Sweat drops when stressed
        if (stressed && !stopped) {
          ctx.fillStyle = 'rgba(59,130,246,0.6)';
          const dropY = y - 30 + ((elapsed * 3) % 1) * 12;
          ctx.beginPath();
          ctx.ellipse(charX + 12, dropY, 2, 3, 0, 0, Math.PI * 2);
          ctx.fill();
          const dropY2 = y - 26 + ((elapsed * 2.5 + 0.5) % 1) * 12;
          ctx.beginPath();
          ctx.ellipse(charX + 15, dropY2, 1.5, 2.5, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        // Exclamation mark when stopped at wall
        if (stopped && elapsed < 11) {
          ctx.fillStyle = '#ef4444';
          ctx.font = 'bold 16px Inter, system-ui, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('!', charX, y - 48);
          ctx.textAlign = 'start';
        }
      }

      function drawCSTicketRain(ctx, elapsed, W, groundY){
        ctx.fillStyle = 'rgba(239,68,68,0.15)';
        const seed = 42;
        for (let i = 0; i < 20; i++) {
          const px = ((i * 137 + seed) % W);
          const py = ((elapsed * 40 + i * 73) % (groundY + 20)) - 10;
          ctx.save();
          ctx.translate(px, py);
          ctx.rotate(((i * 31) % 60 - 30) * Math.PI / 180);
          ctx.fillRect(-4, -6, 8, 12);
          ctx.strokeStyle = 'rgba(239,68,68,0.25)';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(-4, -6, 8, 12);
          // Lines on ticket
          ctx.fillStyle = 'rgba(239,68,68,0.3)';
          ctx.fillRect(-2, -3, 4, 1);
          ctx.fillRect(-2, -0.5, 3, 1);
          ctx.fillStyle = 'rgba(239,68,68,0.15)';
          ctx.restore();
        }
      }

      function drawCSCapacityMeter(ctx, pct, phase, elapsed, W){
        const mx = W - 140, my = 14, mw = 120, mh = 14;
        // Label
        ctx.fillStyle = '#475569';
        ctx.font = '600 9px Inter, system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('CAPACITY', mx + mw, my - 3);
        ctx.textAlign = 'start';
        // Background
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.beginPath();
        ctx.roundRect(mx, my, mw, mh, 4);
        ctx.fill();
        // Fill bar
        const fillW = (pct / 100) * mw;
        const barColor = pct > 50 ? '#22c55e' : pct > 25 ? '#eab308' : '#ef4444';
        // Blink when at 0
        const show = pct > 0 || Math.floor(elapsed * 3) % 2 === 0;
        if (fillW > 0 && show) {
          ctx.fillStyle = barColor;
          ctx.beginPath();
          ctx.roundRect(mx, my, Math.max(fillW, 4), mh, 4);
          ctx.fill();
        }
        // Blinking red outline at 0
        if (pct <= 0 && Math.floor(elapsed * 3) % 2 === 0) {
          ctx.strokeStyle = '#ef4444';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.roundRect(mx, my, mw, mh, 4);
          ctx.stroke();
        }
        // Percentage
        ctx.fillStyle = '#334155';
        ctx.font = 'bold 9px Inter, system-ui, sans-serif';
        ctx.fillText(Math.round(pct) + '%', mx + mw + 6, my + 11);
      }

      function drawCSPhaseText(ctx, text, alpha, W){
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#0A1C60';
        ctx.font = '600 14px Inter, system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(text, 16, 24);
        ctx.restore();
      }

      function drawCSStaticFinal(canvas){
        const dpr = window.devicePixelRatio || 1;
        canvas.width = 960 * dpr;
        canvas.height = 360 * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        const W = 960, H = 360, groundY = H - 60;
        // Draw final scene: character at wall
        ctx.clearRect(0, 0, W, H);
        // Red-tinted sky
        const grad = ctx.createLinearGradient(0, 0, 0, groundY);
        grad.addColorStop(0, '#fee2e2'); grad.addColorStop(1, '#fef2f2');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, groundY);
        // Ground
        drawCSGround(ctx, 0, W, H, groundY);
        // Wall
        const wallX = 260;
        drawCSWall(ctx, wallX, groundY, { w: 140, h: 320, isWall: true }, 12);
        // Character
        drawCSCharacter(ctx, 200, groundY, 12, true, true);
        // Text
        ctx.fillStyle = '#0A1C60';
        ctx.font = '600 14px Inter, system-ui, sans-serif';
        ctx.fillText('What if the model itself could change?', 16, 24);
        // Down arrow
        ctx.fillStyle = '#0070F3';
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        const ax = W / 2, ay = H - 22;
        ctx.moveTo(ax - 8, ay - 6); ctx.lineTo(ax + 8, ay - 6); ctx.lineTo(ax, ay + 4);
        ctx.fill();
        ctx.globalAlpha = 1;
        // Show replay button
        const container = document.getElementById('cs-animation-container');
        if (container) {
          const skipBtn = container.querySelector('.cs-skip-btn');
          const replayBtn = container.querySelector('.cs-replay-btn');
          if (skipBtn) skipBtn.style.display = 'none';
          if (replayBtn) replayBtn.style.display = '';
        }
      }

      function skipCSAnimation(){
        if (STATE.csAnimRAF) { cancelAnimationFrame(STATE.csAnimRAF); STATE.csAnimRAF = null; }
        STATE.csAnimPhase = 'done';
        STATE.csAnimHasPlayed = true;

        if (canvas) drawCSStaticFinal(canvas);
      }

      function replayCSAnimation(){
        if (STATE.csAnimRAF) { cancelAnimationFrame(STATE.csAnimRAF); STATE.csAnimRAF = null; }
        STATE.csAnimPhase = 'idle';
        STATE.csAnimStartTime = null;
        STATE.csAnimCameraX = 0;
        STATE.csAnimHasPlayed = false;

      function buildFlowQueue(){
        const queue = [];
        const idx = 0;
        const isCatalog = SCENARIOS[0].id === 'catalog';
        // Launch phase: user opens Application Workspace on their device
        queue.push({ delay: 600, fn(){ STATE.flowScenarioIdx = idx; STATE.flowPhase = 'launch'; STATE.flowAppOpened = false; updateFlowDOM(); } });
        // Catalog phase: workspace opens, user sees all their apps
        queue.push({ delay: 1200, fn(){ STATE.flowPhase = 'catalog'; updateFlowDOM(); } });
        // Clicking phase: user selects an app from the catalog
        queue.push({ delay: 1500, fn(){ STATE.flowPhase = 'clicking'; updateFlowDOM(); } });
        queue.push({ delay: 1200, fn(){ STATE.flowPhase = 'checking'; updateFlowDOM(); animateChecks(); } });
        queue.push({ delay: 2000, fn(){ STATE.flowPhase = 'routing'; updateFlowDOM(); } });
        queue.push({ delay: 1500, fn(){ STATE.flowPhase = 'config'; updateFlowDOM(); } });
        queue.push({ delay: 1500, fn(){ STATE.flowPhase = 'done'; if (isCatalog) { STATE._firstOpenDone = false; STATE.flowAppOpened = true; } updateFlowDOM(); } });
        queue.push({ delay: 2000, fn(){ STATE.flowPhase = 'final'; updateFlowDOM(); } });
        queue.push({ delay: 3000, fn(){ STATE.flowRunning = false; STATE.flowPaused = false; updateFlowDOM(); } });
        return queue;
      }

      function runFlowQueue(){
        if (STATE.flowPaused || STATE.flowQueueIdx >= STATE.flowQueue.length) return;
        const step = STATE.flowQueue[STATE.flowQueueIdx];
        const tid = setTimeout(() => {
          if (STATE.flowPaused) return;
          step.fn();
          STATE.flowQueueIdx++;
          runFlowQueue();
        }, step.delay);
        STATE.flowTimers.timeouts.push(tid);
      }

      function startFlow(){
        if (STATE.flowRunning) return;
        clearFlowTimers();
        STATE.flowRunning = true;
        STATE.flowPaused = false;
        STATE.flowScenarioIdx = 0;
        STATE.flowPhase = 'idle';
        STATE.flowQueue = buildFlowQueue();
        STATE.flowQueueIdx = 0;
        render();
        runFlowQueue();
      }

      function pauseFlow(){
        if (!STATE.flowRunning) return;
        STATE.flowPaused = true;
        STATE.flowTimers.timeouts.forEach(id => clearTimeout(id));
        STATE.flowTimers.timeouts = [];
        render();
      }

      function resumeFlow(){
        if (!STATE.flowRunning || !STATE.flowPaused) return;
        STATE.flowPaused = false;
        render();
        runFlowQueue();
      }

      function animateChecks(){
        const items = document.querySelectorAll('.check-item');
        items.forEach((item, i) => {
          const tid = setTimeout(() => {
            if (STATE.flowPaused) return;
            item.classList.add('pass');
            const ico = item.querySelector('[data-lucide]');
            if (ico) {
              ico.setAttribute('data-lucide', 'check-circle');
              if (window.lucide?.createIcons) try { window.lucide.createIcons(); } catch {}
            }
          }, i * 350);
          STATE.flowTimers.timeouts.push(tid);
        });
      }

      function updateFlowDOM(){ render(); }

      function resetFlow(){
        clearFlowTimers();
        STATE.flowStep = -1;
        STATE.flowRunning = false;
        STATE.flowPaused = false;
        STATE.flowScenarioIdx = -1;
        STATE.flowPhase = 'idle';
        STATE.flowQueue = [];
        STATE.flowQueueIdx = 0;
        STATE.flowAppOpened = false;
        STATE._firstOpenDone = false;
        STATE.flowDevice = null;
        render();
      }

      function startAppCascade(){
        STATE.autopilotAppCount = 0;
        let count = 0;
        const cascadeInterval = setInterval(() => {
          count++;
          STATE.autopilotAppCount = count;
          // Targeted DOM updates -  no full re-render during rapid cascade
          const counterEl = document.getElementById('ap-app-counter');
          if (counterEl) counterEl.textContent = count + '/' + AP_APPS.length;
          const stepCounter = document.getElementById('ap-step-counter');
          if (stepCounter) stepCounter.textContent = count;
          const grid = document.getElementById('ap-cascade-grid');
          if (grid) {
            const icon = grid.children[count - 1];
            if (icon) {
              icon.classList.add('visible');
              // Replace placeholder with colored icon
              const app = AP_APPS[count - 1];
              icon.innerHTML = '<div class="ap-app-sq" style="background:' + app.c + '">' + app.l + '</div>';
            }
          }
          if (count >= AP_APPS.length) {
            clearInterval(cascadeInterval);
            if (counterEl) { counterEl.classList.add('done'); }
            const frame = document.getElementById('ap-device-frame');
            if (frame) frame.classList.add('ap-wow-glow');
          }
        }, 40);
        STATE.flowTimers.intervals.push(cascadeInterval);
      }

      function renderCapacityGapChart(){
        const svg = document.getElementById('capacity-gap-chart');
        if (!svg) return;
        svg.innerHTML = '';
        svg.setAttribute('viewBox', '0 0 800 420');
        const width = 650, height = 310, margin = {left: 55, bottom: 50, top: 35, right: 95};
        const xScale = t => margin.left + t * width;
        const yScale = v => margin.top + height - v * height;
        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        defs.innerHTML = `
          <linearGradient id="demandGradient" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
          <linearGradient id="capacityGradient" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0A1C60"/><stop offset="100%" stop-color="#0070F3"/></linearGradient>
          <linearGradient id="gapGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(239,68,68,0.12)"/><stop offset="100%" stop-color="rgba(10,28,96,0.04)"/></linearGradient>
          <linearGradient id="capFillGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(10,28,96,0.07)"/><stop offset="100%" stop-color="rgba(10,28,96,0.02)"/></linearGradient>
        `;
        svg.appendChild(defs);
        // Gridlines
        const gridG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        for (let i = 1; i <= 4; i++) { const y = margin.top + (height / 4) * i; gridG.innerHTML += '<line x1="'+margin.left+'" y1="'+y+'" x2="'+(margin.left+width)+'" y2="'+y+'" stroke="#f1f5f9" stroke-width="1"/>'; }
        svg.appendChild(gridG);
        // Axes
        const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        xAxis.classList.add('axis-element', 'chart-element');
        xAxis.innerHTML = '<line x1="'+margin.left+'" y1="'+(margin.top+height)+'" x2="'+(margin.left+width)+'" y2="'+(margin.top+height)+'" class="chart-axis"/><text x="'+(margin.left+width/2)+'" y="'+(margin.top+height+40)+'" text-anchor="middle" class="chart-axis-label">'+STATE.chartConfig.xAxis+'</text>'+STATE.years.map(function(year,i){ const x=xScale(i/3); return '<line x1="'+x+'" y1="'+(margin.top+height)+'" x2="'+x+'" y2="'+(margin.top+height+6)+'" class="chart-axis"/><text x="'+x+'" y="'+(margin.top+height+22)+'" text-anchor="middle" class="chart-year-label chart-element">'+year+'</text>'; }).join('');
        svg.appendChild(xAxis);
        const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        yAxis.classList.add('axis-element', 'chart-element');
        yAxis.innerHTML = '<line x1="'+margin.left+'" y1="'+margin.top+'" x2="'+margin.left+'" y2="'+(margin.top+height)+'" class="chart-axis"/><text x="'+(margin.left-14)+'" y="'+(margin.top+height/2)+'" text-anchor="middle" class="chart-axis-label" transform="rotate(-90,'+(margin.left-14)+','+(margin.top+height/2)+')">'+STATE.chartConfig.yAxis+'</text>';
        svg.appendChild(yAxis);
        // Curves
        const exp = STATE.currentDemandExponent;
        const slope = STATE.currentCapacitySlope;
        let demandPath = 'M '+xScale(0)+' '+yScale(0);
        let capacityPath = 'M '+xScale(0)+' '+yScale(0.3);
        const dPts = [], cPts = [];
        for (let i = 0; i <= 100; i++) { const t = i/100; const dem = Math.pow(t,exp); const cap = 0.3+slope*t; demandPath += ' L '+xScale(t)+' '+yScale(dem); capacityPath += ' L '+xScale(t)+' '+yScale(cap); dPts.push({x:xScale(t),y:yScale(dem)}); cPts.push({x:xScale(t),y:yScale(cap)}); }
        // Capacity area fill
        const capArea = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        capArea.setAttribute('d', capacityPath+' L '+xScale(1)+' '+yScale(0)+' L '+xScale(0)+' '+yScale(0)+' Z'); capArea.setAttribute('fill', 'url(#capFillGrad)'); capArea.classList.add('gap-element','chart-element'); svg.appendChild(capArea);
        // Gap fill
        const gapD = dPts.map(function(p,i){return (i===0?'M':'L')+' '+p.x+' '+p.y;}).join(' ')+cPts.slice().reverse().map(function(p){return ' L '+p.x+' '+p.y;}).join('')+' Z';
        const gapEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        gapEl.setAttribute('d', gapD); gapEl.setAttribute('fill', 'url(#gapGradient)'); gapEl.classList.add('gap-element','chart-element'); svg.appendChild(gapEl);
        // Capacity line
        const capLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        capLine.setAttribute('d', capacityPath); capLine.setAttribute('stroke', 'url(#capacityGradient)'); capLine.setAttribute('fill', 'none'); capLine.classList.add('capacity-line','line-element','chart-element'); svg.appendChild(capLine);
        // Demand line (red)
        const demLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        demLine.setAttribute('d', demandPath); demLine.setAttribute('stroke', 'url(#demandGradient)'); demLine.setAttribute('fill', 'none'); demLine.classList.add('demand-line','line-element','chart-element'); svg.appendChild(demLine);
        // Gap label
        const gapLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        gapLabel.setAttribute('x', xScale(0.45)); gapLabel.setAttribute('y', yScale(0.48)); gapLabel.setAttribute('text-anchor', 'middle'); gapLabel.classList.add('chart-annotation','label-element','chart-element'); gapLabel.textContent = STATE.chartConfig.center; svg.appendChild(gapLabel);
        // Driver markers with navy pill labels
        STATE.drivers.forEach(function(d) {
          if (d.markerYear && (d.state === 'normal' || d.state === 'accelerating')) {
            const t = (d.markerYear - 2025) / 3; const dem = Math.pow(t, exp); const x = xScale(t); const y = yScale(dem);
            const isHot = d.id && STATE.highlightDriverId === d.id;
            const r = isHot ? 6 : 5;
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.classList.add('marker-group','marker-element','chart-element');
            g.setAttribute('role','button'); g.setAttribute('tabindex','0'); g.setAttribute('aria-label','Learn more about '+d.label);
            const lblW = d.label.length * 6 + 18;
            const flipLeft = (x + 14 + lblW) > (margin.left + width + 40);
            const lblX = flipLeft ? (x - 14 - lblW) : (x + 14);
            g.innerHTML = '<title>'+d.short+'</title><circle cx="'+x+'" cy="'+y+'" r="18" fill="transparent" stroke="none"/><circle cx="'+x+'" cy="'+y+'" r="'+r+'" fill="#ef4444" stroke="white" stroke-width="2.5"/><rect x="'+lblX+'" y="'+(y-11)+'" width="'+lblW+'" height="22" rx="11" fill="#0A1C60" opacity="0.9"/><text x="'+(lblX+lblW/2)+'" y="'+(y+4)+'" text-anchor="middle" font-size="10" font-weight="600" fill="white" font-family="Inter, system-ui, sans-serif" class="label-element chart-element">'+d.label+'</text>';
            g.addEventListener('click', function(){ openInsight(d); });
            g.addEventListener('keydown', function(e){ if(e.key==='Enter') openInsight(d); });
            svg.appendChild(g);
          }
        });
        // Tipping point
        if (STATE.showTippingPoint) {
          const t = (STATE.tippingPointYear - 2025) / 3; const x = xScale(t);
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1',x); line.setAttribute('y1',yScale(0)); line.setAttribute('x2',x); line.setAttribute('y2',yScale(1));
          line.setAttribute('stroke','#ef4444'); line.setAttribute('stroke-width','2'); line.setAttribute('stroke-dasharray','8 4'); line.setAttribute('opacity','0.5');
          line.classList.add('line-element','chart-element'); svg.appendChild(line);
          const lblW = 160;
          const lblG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          lblG.classList.add('label-element','chart-element');
          lblG.innerHTML = '<rect x="'+(x+6)+'" y="'+(yScale(1)-14)+'" width="'+lblW+'" height="24" rx="12" fill="#dc2626" opacity="0.9"/><text x="'+(x+6+lblW/2)+'" y="'+(yScale(1)+2)+'" text-anchor="middle" font-size="10" font-weight="600" fill="white" font-family="Inter, system-ui, sans-serif">Operational Breaking Point</text>';
          svg.appendChild(lblG);
          const hit = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          hit.setAttribute('role','button'); hit.setAttribute('tabindex','0'); hit.setAttribute('aria-label','Learn more about Projected Tipping Point');
          hit.innerHTML = '<rect x="'+(x-10)+'" y="'+(yScale(1)-20)+'" width="180" height="'+(height+20)+'" fill="transparent"/>';
          hit.addEventListener('click', function(){ openInsight(STATE.tippingPoint); });
          hit.addEventListener('keydown', function(e){ if(e.key==='Enter') openInsight(STATE.tippingPoint); });
          svg.appendChild(hit);
        }
      }

      function updateCurves(){
        if (STATE.recastMode) { STATE.targetDemandExponent = 1.55; STATE.targetCapacitySlope = 0.18; STATE.showTippingPoint = false; return; }
        let numNormal = 0, numAccelerating = 0;
        STATE.drivers.forEach(d => { if (d.state === 'normal') numNormal++; if (d.state === 'accelerating') numAccelerating++; });
        STATE.targetDemandExponent = 1.6 + (numNormal * 0.15 + numAccelerating * 0.3);
        STATE.targetDemandExponent = Math.min(Math.max(STATE.targetDemandExponent, 1.2), 3);
        STATE.targetCapacitySlope = 0;
        STATE.showTippingPoint = numAccelerating >= 3;
      }

      function animateCurves(){
        STATE.currentDemandExponent += (STATE.targetDemandExponent - STATE.currentDemandExponent) * 0.1;
        STATE.currentCapacitySlope += (STATE.targetCapacitySlope - STATE.currentCapacitySlope) * 0.1;
        renderCapacityGapChart();
        if (Math.abs(STATE.currentDemandExponent - STATE.targetDemandExponent) > 0.001 || Math.abs(STATE.currentCapacitySlope - STATE.targetCapacitySlope) > 0.001) { requestAnimationFrame(animateCurves); }
      }

      function setSlider(id, value){ const driver = STATE.drivers.find(d => d.id === id); if (driver) { driver.state = ['off', 'normal', 'accelerating'][value]; STATE.recastMode = false; updateCurves(); requestAnimationFrame(animateCurves); } }

      function resetSliders(){ STATE.recastMode = false; STATE.drivers.forEach(d => d.state = 'off'); STATE.currentDemandExponent = 1.6; STATE.targetDemandExponent = 1.6; STATE.currentCapacitySlope = 0; STATE.targetCapacitySlope = 0; STATE.showTippingPoint = false; STATE.highlightDriverId = null; render(); }

                ${isPlatformMult ? renderPlatformSiloDiagram(intro) : isChangeVelocity ? renderChangeVelocityChart() : isTippingPoint ? `
                <div class="flex items-center gap-2 mb-4"><i data-lucide="quote" class="w-5 h-5 text-slate-400"></i><span class="text-sm font-bold text-[#0A1C60]">What Analysts Are Saying</span></div>
                <div class="space-y-3">

                  <div class="flex items-start gap-4 p-4 rounded-xl bg-white/70 backdrop-blur-lg shadow-sm hover:shadow-md transition-shadow"><div class="text-sm font-bold min-w-[120px] flex-shrink-0" style="color:#006B3F">Forrester, 2025</div><div class="text-sm text-[#475569] italic">"Application complexity has overtaken infrastructure as the primary bottleneck in IT operations. The breaking point is not a staffing issue — it's architectural."</div></div>
                  <div class="flex items-start gap-4 p-4 rounded-xl bg-white/70 backdrop-blur-lg shadow-sm hover:shadow-md transition-shadow"><div class="text-sm font-bold min-w-[120px] flex-shrink-0" style="color:#D4213D">IDC, 2025</div><div class="text-sm text-[#475569] italic">"Application sprawl across hybrid environments is now the leading driver of unplanned IT work, consuming up to 60% of IT operations capacity."</div></div>

      function renderPlatformSiloDiagram(intro){
        const silos = [

                                return `<div class="flex items-center justify-between px-1.5 py-0.5 rounded text-[8px] ${oi % 2 === 0 ? 'bg-slate-50' : ''}"><span class="font-semibold text-slate-500">${op}</span><span class="font-mono text-red-400 text-right ml-1">${val}</span></div>`;
                              }).join('')}

      function renderChangeVelocityChart(){
        // Stacked area chart: 5 workload layers growing over 2015-2026, flat capacity line
        // Chart dimensions: viewBox 700x320, margin left 40, right 10, top 10, bottom 35
        const W = 700, H = 320, ml = 45, mr = 10, mt = 10, mb = 40;
        const cw = W - ml - mr, ch = H - mt - mb;
        // X positions for years 2015-2026 (12 points)
        const years = [2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025,2026];
        const x = years.map((y,i) => ml + (i / (years.length - 1)) * cw);
        const yP = v => mt + ch - v * ch; // value 0-1 to y pixel

        // 5 layers (values at each year, stacked from bottom). Each value is the layer's own height (not cumulative).
        // Layer 1: Platform management (steady base)
        const L1 = [0.08,0.09,0.10,0.11,0.13,0.15,0.17,0.19,0.21,0.23,0.25,0.27];
        // Layer 2: Packaging workload (grows from 2018+)
        const L2 = [0.04,0.04,0.05,0.06,0.08,0.10,0.13,0.16,0.19,0.22,0.24,0.26];
        // Layer 3: Security & compliance (accelerates from 2019+)
        const L3 = [0.02,0.02,0.03,0.03,0.04,0.07,0.09,0.11,0.13,0.15,0.17,0.19];
        // Layer 4: Migration projects (spikes from 2020+)
        const L4 = [0.01,0.01,0.01,0.02,0.02,0.04,0.06,0.09,0.11,0.13,0.14,0.15];
        // Layer 5: New tool adoption (adds from 2021+)
        const L5 = [0.00,0.00,0.01,0.01,0.01,0.02,0.04,0.06,0.08,0.10,0.12,0.13];

        // Cumulative stacks
        const S1 = L1.map(v => v);
        const S2 = L1.map((v,i) => v + L2[i]);
        const S3 = L1.map((v,i) => v + L2[i] + L3[i]);
        const S4 = L1.map((v,i) => v + L2[i] + L3[i] + L4[i]);
        const S5 = L1.map((v,i) => v + L2[i] + L3[i] + L4[i] + L5[i]);

        // Build area path between two stacks (bottom, top)
        function areaPath(bot, top) {
          let d = 'M ' + x[0] + ' ' + yP(top[0]);
          for (let i = 1; i < x.length; i++) d += ' L ' + x[i] + ' ' + yP(top[i]);
          for (let i = x.length - 1; i >= 0; i--) d += ' L ' + x[i] + ' ' + yP(bot[i]);
          return d + ' Z';
        }
        const zero = years.map(() => 0);

        const colors = [
          {fill:'rgba(26,107,138,0.8)', stroke:'#1a6b8a', label:'Platform management'},
          {fill:'rgba(45,138,94,0.8)', stroke:'#2d8a5e', label:'Packaging workload'},
          {fill:'rgba(184,134,11,0.75)', stroke:'#b8860b', label:'Security & compliance'},
          {fill:'rgba(158,74,90,0.75)', stroke:'#9e4a5a', label:'Migration projects'},
          {fill:'rgba(124,90,166,0.7)', stroke:'#7c5aa6', label:'New tool adoption'},
        ];
        const stacks = [[zero,S1],[S1,S2],[S2,S3],[S3,S4],[S4,S5]];

        // Milestones (year index, label, detail)
        const milestones = [
          {yi:4, year:2019, label:'AVD launches', detail:'Azure Virtual Desktop goes GA. IT adds virtual desktop app delivery \u2014 golden images, host pools, session management. Platform count: 3+.', dotColor:'#7c5aa6'},
          {yi:5, year:2020, label:'COVID / remote shift', detail:'Remote work explodes. Every app must work from anywhere. VPN, cloud apps, BYOD support all multiply the packaging and testing workload.', dotColor:'#9e4a5a'},
          {yi:7, year:2022, label:'W365 + Intune co-mgmt', detail:'Windows 365 and Intune co-management go mainstream. IT adds cloud PC delivery alongside SCCM and Citrix. Platform count: 4+. Every app now requires testing across all environments.', dotColor:'#2d8a5e'},
        ];

        // Capacity line at 0.22 (flat)
        const capY = 0.22;

        return `
          <div class="rounded-xl border border-slate-200 bg-white/80 p-4">
            <svg viewBox="0 0 ${W} ${H}" class="w-full" style="max-height:360px" aria-label="Stacked area chart showing IT workload growth from 2015 to 2026">
              <defs>
                <clipPath id="cv-clip"><rect x="${ml}" y="${mt}" width="${cw}" height="${ch}"/></clipPath>
              </defs>
              <!-- Background -->
              <rect x="${ml}" y="${mt}" width="${cw}" height="${ch}" fill="#f9fafb" rx="4"/>
              <!-- Grid lines -->
              ${[0.2,0.4,0.6,0.8].map(v => `<line x1="${ml}" y1="${yP(v)}" x2="${ml+cw}" y2="${yP(v)}" stroke="#e5e7eb" stroke-width="0.5"/>`).join('')}
              <!-- Stacked areas (clip to chart area) -->
              <g clip-path="url(#cv-clip)">
                ${stacks.map(([bot,top],i) => `<path d="${areaPath(bot,top)}" fill="${colors[i].fill}" stroke="${colors[i].stroke}" stroke-width="1.5"/>`).join('')}
              </g>
              <!-- Capacity line (dashed red) -->
              <line x1="${ml}" y1="${yP(capY)}" x2="${ml+cw}" y2="${yP(capY)}" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="8 5" opacity="0.7"/>
              <text x="${ml+4}" y="${yP(capY)-6}" font-size="9" fill="#dc2626" font-weight="600" font-family="Inter, system-ui, sans-serif">IT capacity (headcount)</text>
              <!-- Milestone dots -->
              ${milestones.map(m => {
                const mx = x[m.yi];
                const my = yP(S5[m.yi]);
                return `<circle cx="${mx}" cy="${my}" r="5" fill="${m.dotColor}" stroke="white" stroke-width="2.5"/>
                  <text x="${mx+8}" y="${my+3}" font-size="8" fill="#64748b" font-weight="600" font-family="Inter, system-ui, sans-serif">${m.label}</text>`;
              }).join('')}
              <!-- X axis labels -->
              ${years.filter((y,i) => i % 2 === 0).map((y,i) => `<text x="${x[i*2]}" y="${mt+ch+20}" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500" font-family="Inter, system-ui, sans-serif">${y}</text>`).join('')}
              <!-- Y axis label -->
              <text x="14" y="${mt + ch/2}" text-anchor="middle" font-size="9" fill="#94a3b8" font-weight="600" font-family="Inter, system-ui, sans-serif" transform="rotate(-90,14,${mt+ch/2})">WORKLOAD</text>
            </svg>

            <!-- Milestone detail card -->
            <div class="mt-3 bg-slate-50 border border-slate-200 rounded-lg p-3">
              <div class="text-xs font-bold text-[#0A1C60] mb-1">2022 &mdash; W365 + Intune co-management goes mainstream</div>
              <div class="text-[11px] text-[#64748b] leading-relaxed">IT adds cloud PC delivery alongside existing SCCM, Citrix, and Intune. Platform count: 4+. Every app now requires testing across all environments.</div>
            </div>

            <!-- Legend -->
            <div class="flex flex-wrap items-center justify-center gap-x-4 gap-y-1 mt-3">
              ${colors.map(c => `<div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-sm" style="background:${c.stroke}"></div><span class="text-[10px] text-slate-500 font-medium">${c.label}</span></div>`).join('')}
              <div class="flex items-center gap-1.5"><span class="inline-block w-5 border-t-2 border-dashed border-red-500"></span><span class="text-[10px] text-slate-500 font-medium">IT capacity (headcount)</span></div>
            </div>
          </div>

        const queue = [];

        queue.push({ delay: 2000, fn(){ STATE.obPhase = 'diverge'; render(); } });
        queue.push({ delay: 2500, fn(){ STATE.obPhase = 'deploying'; render(); } });
        queue.push({ delay: 3500, fn(){ STATE.obPhase = 'result'; render(); } });
        queue.push({ delay: 2500, fn(){ STATE.obPhase = 'done'; render(); } });
        queue.push({ delay: 2500, fn(){ STATE.obRunning = false; STATE.obPaused = false; render(); } });
        return queue;
      }

      function runObQueue(){
        if (STATE.obPaused || STATE.obQueueIdx >= STATE.obQueue.length) return;

          step.fn();
          STATE.obQueueIdx++;
          runObQueue();
        }, step.delay);
        STATE.flowTimers.timeouts.push(tid);

      function generatePDF(companyName){
        if (!window.jspdf) { alert('PDF library not loaded. Please refresh and try again.'); return; }
        try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'pt', format: 'letter' });
        const W = 612, H = 792, ML = 36, MR = 36, CW = W - ML - MR;
        const r = STATE.calcResult, ci = STATE.calcInputs, sc = STATE.calcScenario, a = ROI_ASSUMPTIONS[sc];
        const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        const PB = [0,0,204], AC = [0,191,255], DT = [26,26,46], MG = [74,74,90], LG = [240,240,246];
        const GR = [15,122,63], RR = [204,34,34], CO = [224,112,80], MB = [170,187,238], DB = [34,34,221];
        const GAP = 12, COLW = (CW - GAP) / 2, LX = ML, RX = ML + COLW + GAP;
        const BF = 8.5, LH = 10.5;

        function setC(c){ doc.setTextColor(c[0],c[1],c[2]); }
        function setF(c){ doc.setFillColor(c[0],c[1],c[2]); }
        function setD(c){ doc.setDrawColor(c[0],c[1],c[2]); }

        function drawHeader(pg){
          setF(PB); doc.rect(0, 0, W, 48, 'F');
          doc.setFont('Helvetica','bold'); doc.setFontSize(15); setC([255,255,255]); doc.text('Recast', ML, 30);
          const rw = doc.getTextWidth('Recast');
          doc.setFont('Helvetica','normal'); doc.setFontSize(8); setC(AC); doc.text('Software', ML + rw + 3, 30);
          doc.setFont('Helvetica','normal'); doc.setFontSize(11); setC(DB); doc.text('+', 185, 12); doc.text('+', 415, 38);
          doc.setFont('Helvetica','bold'); doc.setFontSize(9.5); setC([255,255,255]); doc.text('Prepared for ' + companyName, W - MR, 16, { align: 'right' });
          doc.setFont('Helvetica','normal'); doc.setFontSize(7); setC(MB); doc.text('Executive Impact Summary', W - MR, 26, { align: 'right' });
          doc.setFontSize(6.5); doc.text(today, W - MR, 35, { align: 'right' });
        }
        function drawFooter(pg){
          setF(PB); doc.rect(0, H - 16, W, 16, 'F');
          doc.setFont('Helvetica','normal'); doc.setFontSize(6); setC(MB);
          doc.text('Recast Software  |  Business Impact Summary  |  Confidential', ML, H - 5);
          doc.text('Page ' + pg + ' of 2', W - MR, H - 5, { align: 'right' });
        }
        function secBar(x, y, w, text){
          setF(PB); doc.rect(x, y, w, 13, 'F');
          doc.setFont('Helvetica','bold'); doc.setFontSize(7.5); setC([255,255,255]); doc.text(text, x + 5, y + 9);
          return y + 15;
        }
        function secBarFull(y, text){
          setF(LG); doc.rect(ML, y, CW, 16, 'F');
          doc.setFont('Helvetica','bold'); doc.setFontSize(10); setC(PB); doc.text(text, ML + 6, y + 11);
          return y + 19;
        }
        function subLbl(x, y, w, text){
          setF([230,230,250]); doc.rect(x, y, w, 10, 'F');
          doc.setFont('Helvetica','bold'); doc.setFontSize(7); setC(PB); doc.text(text, x + 4, y + 7);
          return y + 12;
        }
        function blt(x, y, w, bold, desc){
          setF([0,160,70]); doc.circle(x + 3, y + 3.5, 1.5, 'F');
          const bx = x + 9, mw = w - 12;
          doc.setFontSize(BF);
          if (bold) {
            doc.setFont('Helvetica','bold'); setC(DT);
            const bw = doc.getTextWidth(bold + ' ');
            const fits = doc.splitTextToSize(desc, mw - bw);
            if (fits.length <= 1) {
              doc.text(bold, bx, y + 5.5);
              doc.setFont('Helvetica','normal'); setC(MG); doc.text(' ' + desc, bx + bw, y + 5.5);
              return y + LH;
            }
            doc.text(bold, bx, y + 5.5);
            doc.setFont('Helvetica','normal'); setC(MG);
            doc.text(fits[0], bx + bw, y + 5.5);
            const rest = desc.substring(fits[0].length).trim();
            if (rest) {
              const wl = doc.splitTextToSize(rest, mw);
              for (let i = 0; i < wl.length; i++) doc.text(wl[i], bx, y + 5.5 + (i+1) * LH);
              return y + (wl.length + 1) * LH + 1;
            }
            return y + LH;
          }
          doc.setFont('Helvetica','normal'); doc.setFontSize(BF); setC(MG);
          const lines = doc.splitTextToSize(desc, mw);
          doc.text(lines, bx, y + 5.5);
          return y + lines.length * LH + 1;
        }
        function callout(x, y, w, text){
          setF([240,245,255]); doc.rect(x, y, w, 14, 'F');
          setD(PB); doc.setLineWidth(2); doc.line(x, y, x, y + 14); doc.setLineWidth(0.5);

      function calculateImpact(){
        const ci = STATE.calcInputs;
        const a = ROI_ASSUMPTIONS[STATE.calcScenario];
        const currentSupportHours = round((ci.monthlyTickets * ci.avgTicketMins) / 60);
        const ticketHoursReturned = round(currentSupportHours * a.ticketReduction);
        const ticketsAvoided = Math.round(ci.monthlyTickets * a.ticketReduction);
        const pkgHoursReturned = round(ci.pkgHours * a.pkgReduction);
        const patchHoursReturned = round(ci.patchHours * a.patchReduction);
        const totalHoursMonth = round(ticketHoursReturned + pkgHoursReturned + patchHoursReturned);
        const totalHoursYear = round(totalHoursMonth * 12);
        const fteCapacity = round(totalHoursYear / a.fteHours);
        const strategicHours = Math.round(totalHoursYear * a.strategicRealloc);
        const reqsDeferred = ci.openReqs > 0 ? Math.min(ci.openReqs, Math.floor(fteCapacity)) : 0;
        const delayedInitiatives = ci.delayedInitiatives;
        const supportCostAnnual = Math.round(currentSupportHours * 90 * 12);
        const engineeringCostAnnual = Math.round((ci.pkgHours + ci.patchHours) * 120 * 12);
        const wasteCostAnnual = Math.round((supportCostAnnual + engineeringCostAnnual) * 0.25);
        const totalBurnAnnual = supportCostAnnual + engineeringCostAnnual + wasteCostAnnual;
        const totalRecoveredAnnual = Math.round((ticketHoursReturned * 90 + (pkgHoursReturned + patchHoursReturned) * 120) * 12);
        const monthlyCostOfWaiting = Math.round(totalRecoveredAnnual / 12);
        STATE.calcResult = { currentSupportHours, ticketHoursReturned, ticketsAvoided, pkgHoursReturned, patchHoursReturned, totalHoursMonth, totalHoursYear, fteCapacity, strategicHours, reqsDeferred, delayedInitiatives, supportCostAnnual, engineeringCostAnnual, wasteCostAnnual, totalBurnAnnual, totalRecoveredAnnual, monthlyCostOfWaiting };
      }
