            render(); return;
          }
          if (action === 'open-analyst-modal') { STATE.showAnalystModal = true; render(); return; }
          if (action === 'close-analyst-modal') { STATE.showAnalystModal = false; render(); return; }
          if (action === 'open-ai-agent') { STATE.showAIAgent = true; render(); return; }
          if (action === 'close-ai-agent') { STATE.showAIAgent = false; render(); return; }
          if (action === 'close-insight-modal') { STATE.insightContent = null; STATE.highlightDriverId = null; render(); return; }
          if (action === 'why-nav') { STATE.openWhyModal = act.getAttribute('data-to'); render(); return; }

          if (action === 'open-why-modal') {
            const id = act.getAttribute('data-why');
            // Save current chart state before temporarily changing it for the modal
            STATE._savedDriverStates = STATE.drivers.map(d => d.state);
            STATE._savedTippingPoint = STATE.showTippingPoint;
            STATE._savedRecastMode = STATE.recastMode;
            STATE._savedDemandExp = STATE.targetDemandExponent;
            STATE._savedCapSlope = STATE.targetCapacitySlope;
            STATE.recastMode = false; STATE.drivers.forEach(d => d.state = 'off'); STATE.showTippingPoint = false;
            if (id === 'change') { STATE.drivers.forEach(d => { if (['more_apps','constant_updates','too_many_tools','manual_rework'].includes(d.id)) d.state = 'normal'; }); }
            else if (id === 'now') { STATE.drivers.forEach(d => { if (['more_apps','constant_updates','too_many_tools','manual_rework','security_compliance'].includes(d.id)) d.state = 'accelerating'; }); STATE.showTippingPoint = true; }
            else if (id === 'recast') { STATE.recastMode = true; }
            updateCurves(); requestAnimationFrame(animateCurves);
            STATE.openWhyModal = id; render(); return;
          }

          if (action === 'flip-card') { const cardId = act.getAttribute('data-card-id'); STATE.flippedCards[cardId] = !STATE.flippedCards[cardId]; const cardEl = act.closest('.flip-card'); if (cardEl) cardEl.classList.toggle('flipped'); return; }
          if (action === 'toggle-card') { const id = act.getAttribute('data-card'); const wasOpen = STATE.openCards[id]; Object.keys(STATE.openCards).forEach(k => STATE.openCards[k] = false); STATE.openCards[id] = !wasOpen; if (STATE.openCards[id] && !STATE.visitedCards.includes(id)) STATE.visitedCards.push(id); render(); if (STATE.openCards[id]) { setTimeout(() => act.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 200); } return; }
          if (action === 'expand-all') { Object.keys(STATE.openCards).forEach(k => STATE.openCards[k] = true); STATE.visitedCards = ['core','onboarding','trust']; render(); return; }
          if (action === 'calculate-impact') { calculateImpact(); render(); return; }
          if (action === 'toggle-assumptions') { STATE.showAssumptions = !STATE.showAssumptions; render(); return; }
          if (action === 'save-assumptions') {
            const sc = STATE.calcScenario; const clamp = (v) => Math.max(0, Math.min(100, cleanNum(v))) / 100;
            const t = document.getElementById('asn-ticket'); const p = document.getElementById('asn-pkg'); const pa = document.getElementById('asn-patch'); const s = document.getElementById('asn-strategic');
            if (t) ROI_ASSUMPTIONS[sc].ticketReduction = clamp(t.value); if (p) ROI_ASSUMPTIONS[sc].pkgReduction = clamp(p.value); if (pa) ROI_ASSUMPTIONS[sc].patchReduction = clamp(pa.value); if (s) ROI_ASSUMPTIONS[sc].strategicRealloc = clamp(s.value);
            calculateImpact(); STATE.showAssumptions = false; render(); return;
          }
          if (action === 'toggle-regulated') { STATE.calcInputs.regulated = act.getAttribute('data-val') === 'true'; render(); return; }
          if (action === 'select-device') { STATE.flowDevice = act.getAttribute('data-device'); startFlow(); return; }
          if (action === 'toggle-flow') { if (!STATE.flowRunning) { if (!STATE.flowDevice) STATE.flowDevice = 'Windows'; startFlow(); } else if (STATE.flowPaused) { resumeFlow(); } else { pauseFlow(); } return; }
          if (action === 'reset-flow') { resetFlow(); return; }
          if (action === 'toggle-admin-view') { STATE.showAdminView = !STATE.showAdminView; render(); return; }
          if (action === 'toggle-autopilot') { STATE.showAutopilot = !STATE.showAutopilot; STATE.autopilotStep = -1; STATE.autopilotAppCount = 0; clearFlowTimers(); render(); return; }
          if (action === 'start-autopilot') {
            if (STATE.autopilotStep >= 0) return;
            STATE.autopilotStep = 0; STATE.autopilotAppCount = 0; render();
            const apQueue = [
              { delay: 1800, fn(){ STATE.autopilotStep = 1; render(); } },
              { delay: 1800, fn(){ STATE.autopilotStep = 2; render(); } },
              { delay: 1800, fn(){ STATE.autopilotStep = 3; render(); } },
              { delay: 1800, fn(){ STATE.autopilotStep = 4; render(); } },
              { delay: 1800, fn(){ STATE.autopilotStep = 5; render(); } },
              { delay: 1800, fn(){ STATE.autopilotStep = 6; render(); startAppCascade(); } },
              { delay: 2500, fn(){ STATE.autopilotStep = 7; render(); } },
            ];
            let qIdx = 0;
            function runApQueue(){
              if (qIdx >= apQueue.length) return;
              const step = apQueue[qIdx];
              const tid = setTimeout(() => { step.fn(); qIdx++; runApQueue(); }, step.delay);
              STATE.flowTimers.timeouts.push(tid);
            }
            runApQueue();
            return;
          }
          if (action === 'reset-autopilot') { clearFlowTimers(); STATE.autopilotStep = -1; STATE.autopilotAppCount = 0; render(); return; }

          if (action === 'open-pdf-input') { STATE.pdfCompanyInput = true; render(); setTimeout(() => { const el = document.getElementById('pdf-company-input'); if (el) el.focus(); }, 50); return; }
          if (action === 'cancel-pdf-input') { STATE.pdfCompanyInput = false; render(); return; }
          if (action === 'submit-pdf-company') { const input = document.getElementById('pdf-company-input'); const name = (input?.value || '').trim() || 'Your Organization'; STATE.pdfCompanyName = name; generatePDF(name); STATE.pdfCompanyInput = false; render(); return; }

          if (action === 'open-currentstate-editor') {
            STATE.modalOpen = true; STATE.editTab = 'change';
            STATE.editBuffers = { change: { intro: '', bullets: '', analyst: '' }, now: { intro: '', bullets: '', analyst: '' }, recast: { intro: '', bullets: '', analyst: '' } };
            STATE.editChartBuffer = null; render();
            setTimeout(()=>{ try { window.lucide?.createIcons?.(); } catch{} }, 0);
            setTimeout(()=>{ initCurrentStateModal(); }, 0); return;
          }

          if (action === 'switch-edit-tab') { STATE.editTab = act.getAttribute('data-tab'); render(); setTimeout(()=>{ try { window.lucide?.createIcons?.(); } catch{} }, 0); return; }

          if (action === 'save-currentstate') {
            const fallback = STATE.defaultsCurrentState(); const formData = readFields();
            const activeKey = STATE.editTab;
            // Only update the section the user is currently editing — leave others untouched
            if (activeKey === 'change' || activeKey === 'now') {
              const fd = formData[activeKey]; const fb = fallback[activeKey];
              STATE.currentState[activeKey] = {
                intro: (fd.intro || '').trim() || fb.intro,
                bullets: parseLines(fd.bullets) || fb.bullets,
                analyst: (fd.analyst || '').trim() || fb.analyst
              };
            }
            saveDraft({ change: { intro: '', bullets: STATE.currentState.change.bullets.join('\n'), analyst: STATE.currentState.change.analyst }, now: { intro: '', bullets: STATE.currentState.now.bullets.join('\n'), analyst: STATE.currentState.now.analyst }, recast: { intro: STATE.currentState.recast.intro, bullets: STATE.currentState.recast.bullets.join('\n'), analyst: STATE.currentState.recast.analyst }, chartConfig: { ...STATE.chartConfig }, drivers: STATE.drivers.map(d => ({ label: d.label, bullets: d.bullets.join('\n') })) });
            STATE.modalOpen = false; STATE.activeTab = 'problems'; render(); return;
          }

          if (action === 'reset-currentstate-defaults') { clearDraft(); const defaults = STATE.defaultsCurrentState(); STATE.currentState.change = defaults.change; STATE.currentState.now = defaults.now; STATE.editBuffers = { change: { intro: '', bullets: '', analyst: '' }, now: { intro: '', bullets: '', analyst: '' }, recast: { intro: '', bullets: '', analyst: '' } }; render(); return; }
          if (action === 'reset-sliders') { resetSliders(); return; }
        });

        root.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { const flipTarget = e.target.closest('[data-action="flip-card"]'); if (flipTarget) { flipTarget.click(); e.preventDefault(); } } });

        let _roiDebounce = null;
        root.addEventListener('input', (e) => {
          if (e.target?.id === 'roi-employees') { const n = cleanNum(e.target.value); if (n > 0) { deriveFromEmployees(n); calculateImpact(); clearTimeout(_roiDebounce); _roiDebounce = setTimeout(() => render(), 600); } return; }
          if (e.target?.id === 'roi-users') { STATE.calcInputs.users = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-endpoints') { STATE.calcInputs.endpoints = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-envs') { STATE.calcInputs.envs = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-apps') { STATE.calcInputs.apps = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-custom') { STATE.calcInputs.customApps = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-tickets') { STATE.calcInputs.monthlyTickets = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-ticketmins') { STATE.calcInputs.avgTicketMins = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-pkghrs') { STATE.calcInputs.pkgHours = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-patchhrs') { STATE.calcInputs.patchHours = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-reqs') { STATE.calcInputs.openReqs = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-initiatives') { STATE.calcInputs.delayedInitiatives = cleanNum(e.target.value); return; }
          const buf = e.target.closest('[data-action="edit-buffer"]');
          if (buf) { const key = buf.getAttribute('data-key'); const sub = buf.getAttribute('data-subkey'); if (STATE.editBuffers?.[key]) STATE.editBuffers[key][sub] = e.target.value; }
          if (STATE.modalOpen && STATE.editTab === 'chart') { STATE.editChartBuffer = readChartFieldsRaw(); }
        });
        const pdfInput = document.getElementById('pdf-company-input');
        if (pdfInput) { pdfInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); const name = (pdfInput.value || '').trim() || 'Your Organization'; STATE.pdfCompanyName = name; generatePDF(name); STATE.pdfCompanyInput = false; render(); } }); }
      }

      let accordionKeyboardBound = false;
      function attachAccordionKeyboard(){
        if (accordionKeyboardBound) return; accordionKeyboardBound = true;
        document.addEventListener('keydown', (e) => {
          const target = e.target; if (!target || !target.classList || !target.classList.contains('accordion-header')) return;
          const headers = Array.from(document.querySelectorAll('.accordion-header')); const idx = headers.indexOf(target);
          if (e.key === 'ArrowDown') { headers[(idx + 1) % headers.length]?.focus(); e.preventDefault(); }
          else if (e.key === 'ArrowUp') { headers[(idx - 1 + headers.length) % headers.length]?.focus(); e.preventDefault(); }
          else if (e.key === 'Home') { headers[0]?.focus(); e.preventDefault(); }
          else if (e.key === 'End') { headers[headers.length - 1]?.focus(); e.preventDefault(); }
          else if (e.key === 'Enter' || e.key === ' ') { target.click(); e.preventDefault(); }
        });
      }

      STATE.drivers.forEach(d => d.state = 'accelerating');
      STATE.showTippingPoint = true;
      updateCurves();
      STATE.currentDemandExponent = STATE.targetDemandExponent;
      STATE.currentCapacitySlope = STATE.targetCapacitySlope;

      deriveFromEmployees(STATE.calcInputs.users);
      calculateImpact();
      document.addEventListener('DOMContentLoaded', render);
      document.addEventListener('keydown',(e)=>{ if(e.key==='Escape' && (STATE.modalOpen || STATE.openWhyModal || STATE.insightContent || STATE.showAnalystModal || STATE.showAIAgent)){ if (STATE.openWhyModal && STATE._savedDriverStates) { STATE.drivers.forEach((d, i) => { d.state = STATE._savedDriverStates[i]; }); STATE.showTippingPoint = STATE._savedTippingPoint; STATE.recastMode = STATE._savedRecastMode; STATE.targetDemandExponent = STATE._savedDemandExp; STATE.targetCapacitySlope = STATE._savedCapSlope; STATE._savedDriverStates = null; updateCurves(); requestAnimationFrame(animateCurves); } STATE.modalOpen=false; STATE.openWhyModal=null; STATE.insightContent=null; STATE.highlightDriverId=null; STATE.showAnalystModal=false; STATE.showAIAgent=false; render(); } });
    </script>
  </body>
</html>
